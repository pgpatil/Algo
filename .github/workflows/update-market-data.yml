name: Update Indian stock market data

on:
  schedule:
    # 12:00 UTC = 17:30 IST, after NSE close (15:30 IST), Mon-Fri
    - cron: '0 12 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python scripts/fetch_market_data.py --years 5

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh Indian stock market data"
          git push
